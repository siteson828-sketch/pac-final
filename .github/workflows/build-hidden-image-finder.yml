name: Build Hidden Image Finder APK

on:
  push:
    branches: [main]
    paths:
      - "HiddenImageFinder/**"
      - ".github/workflows/build-hidden-image-finder.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: HiddenImageFinder
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hidden-image-finder-debug-apk
          path: HiddenImageFinder/app/build/outputs/apk/debug/*.apk
